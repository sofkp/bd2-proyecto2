services:
  db:
    image: pgvector/pgvector:pg16
    container_name: bd2_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bd2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bd2}
      POSTGRES_DB: ${POSTGRES_DB:-bd2_proyecto2}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bd2} -d ${POSTGRES_DB:-bd2_proyecto2}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bd2_backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-bd2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bd2}
      POSTGRES_DB: ${POSTGRES_DB:-bd2_proyecto2}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./experiments:/app/experiments
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: bd2_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
